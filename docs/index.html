<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ZeroBalance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="menu" class="screen active">
    <h2>🎲 ZeroBalance</h2>
    <input id="bet" type="number" placeholder="Ставка">
    <input id="promoInput" type="text" placeholder="Промокод">
    <button onclick="usePromo()">Активировать</button>
    <br>
    <button onclick="roll()">Кинуть кубики</button>
    <button onclick="openBag()">Мешок</button>
    <button onclick="openTop()">Топ</button>
    <button onclick="openLevel()">Уровень</button>
    <button onclick="openTrades()">Трейды</button>
</div>

<div id="loading" class="screen">
    <div class="loader"></div>
    <div>Крутим кубики...</div>
</div>

<div id="result" class="screen">
    <div class="big" id="diceResult"></div>
    <div class="big" id="winResult"></div>
    <button onclick="takePrize()">Забрать приз</button>
</div>

<div id="bag" class="screen">
    <div class="header"><button onclick="back()">← Назад</button></div>
    <h2>👜 Твой мешок</h2>
    <div class="big" id="bagAmount">0</div>
</div>

<div id="top" class="screen">
    <div class="header"><button onclick="back()">← Назад</button></div>
    <h2>🏆 Топ игроков</h2>
    <button onclick="showLocalTop()">Топ группы</button>
    <button onclick="showGlobalTop()">Глобальный топ</button>
    <div class="big" id="topResult">Выбери тип топа</div>
</div>

<div id="level" class="screen">
    <div class="header"><button onclick="back()">← Назад</button></div>
    <h2>⭐ Уровень</h2>
    <div class="big" id="levelInfo">Загрузка...</div>
    <button onclick="buyLevel()">Купить уровень</button>
</div>

<div id="trades" class="screen">
    <div class="header"><button onclick="back()">← Назад</button></div>
    <h2>💱 Трейды</h2>
    <button onclick="toggleTrades()" style="margin-bottom:12px;">
        <span id="tradeStatus">Трейды включены</span>
    </button>
    <div style="margin-top:12px;">
        <input id="tradeUser" type="text" placeholder="Юзернейм игрока">
        <input id="tradeAmount" type="number" placeholder="Сумма">
        <button onclick="sendTrade()">Отправить трейд</button>
    </div>
    <div id="tradeResult" class="big" style="margin-top:20px;"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
